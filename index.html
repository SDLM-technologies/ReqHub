<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDLM ReqHub</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
    <style>
        :root {
            --bg: #121212;
            --bg-card: #1e1e24;
            --text: #e0e0e0;
            --primary: #9b51e0;
            --secondary: #f2c94c;
            --hover: #bb86fc;
            --success: #2e7d32;
            --error: #c62828;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        h1 { margin: 0; color: var(--primary); }
        .settings-btn {
            background: none; border: none; font-size: 1.5rem; color: var(--text); cursor: pointer; transition: 0.3s;
        }
        .settings-btn:hover { color: var(--secondary); transform: rotate(90deg); }
        
        .search-container {
            width: 100%; max-width: 600px; display: flex; gap: 10px; margin-bottom: 20px;
        }
        input[type="text"], select {
            flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: white;
            font-size: 1rem;
        }
        input[type="text"]:focus, select:focus { outline: none; border-color: var(--primary); }
        button {
            padding: 12px 20px; border-radius: 8px; border: none; background: var(--primary); color: white;
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        button:hover { background: var(--hover); }

        .results { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 15px; }
        .track-card {
            background: var(--bg-card); border-radius: 10px; padding: 15px; display: flex; gap: 15px;
            align-items: center; border: 1px solid transparent; transition: 0.2s; cursor: pointer;
        }
        .track-card:hover { border-color: var(--secondary); }
        .track-card.selected { border-color: var(--primary); box-shadow: 0 0 10px rgba(155, 81, 224, 0.3); }
        .track-cover { width: 60px; height: 60px; border-radius: 6px; object-fit: cover; }
        .track-info { flex: 1; }
        .track-title { font-weight: bold; font-size: 1.1rem; margin-bottom: 4px; }
        .track-artist { color: #aaa; font-size: 0.9rem; }

        .playlists-section {
            width: 100%; max-width: 600px; background: var(--bg-card); padding: 15px; border-radius: 10px;
            margin-top: 20px; display: none; box-sizing: border-box;
        }
        .playlists-list { max-height: 200px; overflow-y: auto; margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
        .playlist-label { display: flex; align-items: center; gap: 10px; cursor: pointer; word-break: break-all; }
        
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--bg-card); padding: 25px; border-radius: 12px; width: 90%; max-width: 400px;
            display: flex; flex-direction: column; gap: 15px;
        }
        .modal h2 { margin: 0 0 10px 0; color: var(--secondary); }
        .modal input, .modal select { width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }

        .toast {
            position: fixed; bottom: 20px; right: 20px; background: #333; color: white;
            padding: 12px 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: none; z-index: 1000;
        }

        /* Playlist Manager specific styles */
        .view { display: none; width: 100%; max-width: 600px; flex-direction: column; align-items: center; }
        .view.active { display: flex; }
        
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .btn-secondary { background: var(--secondary); color: black; }
        .btn-secondary:hover { background: #e0b63b; }
        .btn-danger { background: var(--error); }
        .btn-danger:hover { background: #b71c1c; }
        .btn-outline { background: transparent; border: 1px solid var(--text); color: var(--text); }
        .btn-outline:hover { background: rgba(255,255,255,0.1); }
        
        .playlist-manager-item {
            width: 100%; background: var(--bg-card); padding: 15px; border-radius: 10px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s;
            box-sizing: border-box;
        }
        .playlist-manager-item:hover { border-left: 4px solid var(--primary); }
        
        .create-playlist-container { width: 100%; display: flex; gap: 10px; margin-top: 20px; }
        
        .playlist-header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .playlist-actions { width: 100%; display: flex; gap: 10px; margin-bottom: 20px; }
        
        .playlist-track-item {
            width: 100%; background: var(--bg-card); padding: 12px 15px; border-radius: 8px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;
        }
        .playlist-track-name { flex: 1; word-break: break-all; margin-right: 10px; }
        .delete-icon-btn {
            background: var(--error); border: none; border-radius: 4px; color: white; cursor: pointer;
            padding: 8px; display: none;
        }
        .delete-icon-btn:hover { background: #b71c1c; }
        .edit-mode .delete-icon-btn { display: block; }
        .edit-mode .btn-danger { display: block !important; }
    </style>
</head>
<body>

    <header>
        <h1><span style="color: var(--secondary);">SDLM</span> ReqHub</h1>
        <div class="header-actions">
            <button class="btn-outline" style="padding: 8px 12px;" onclick="openPlaylistsManager()" data-i18n="manage_playlists">Manage Playlists</button>
            <button class="settings-btn" onclick="openSettings()">⚙️</button>
        </div>
    </header>

    <!-- MAIN VIEW -->
    <div id="mainView" class="view active">
        <div class="search-container">
            <input type="text" id="searchInput" data-i18n="search_placeholder" placeholder="Search for music...">
            <button onclick="searchMusic()" data-i18n="search_btn">Search</button>
        </div>

        <div class="results" id="resultsList"></div>

        <div class="playlists-section" id="playlistsSection">
            <h3 style="margin-top:0" data-i18n="add_to_playlists">Add to playlists</h3>
            <div class="playlists-list" id="playlistsList"></div>
            <button id="addBtn" style="margin-top: 15px; width: 100%; background: var(--secondary); color: black;" onclick="addMusic()" data-i18n="add_btn">Add</button>
        </div>
    </div>

    <!-- PLAYLIST MANAGER VIEW -->
    <div id="playlistManagerView" class="view">
        <div style="width:100%; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
            <button class="btn-outline" onclick="switchView('mainView')" data-i18n="back_btn">← Back</button>
            <h2 style="margin:0; color: var(--primary);" data-i18n="my_playlists">My Playlists</h2>
            <div style="width: 80px;"></div> <!-- placeholder to center title -->
        </div>
        <div id="managerPlaylistsList" style="width: 100%;"></div>
        <div class="create-playlist-container">
            <input type="text" id="newPlaylistName" data-i18n="new_playlist_placeholder" placeholder="New playlist name...">
            <button onclick="createPlaylist()" data-i18n="create_btn">Create</button>
        </div>
    </div>

    <!-- PLAYLIST DETAIL VIEW -->
    <div id="playlistDetailView" class="view">
        <div class="playlist-header">
            <button class="btn-outline" onclick="openPlaylistsManager()" data-i18n="back_btn">← Back</button>
            <h2 id="detailPlaylistTitle" style="margin:0; color: var(--secondary); word-break: break-all; text-align:center; flex:1; padding: 0 10px;"></h2>
            <button id="deletePlaylistBtn" class="btn-danger" style="display: none;" onclick="deleteCurrentPlaylist()" data-i18n="delete_btn">Delete</button>
        </div>
        <div class="playlist-actions">
            <button id="toggleEditBtn" class="btn-secondary" style="flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s;" onclick="toggleEditMode()" data-i18n="manage_playlist_btn">Manage playlist</button>
        </div>
        
        <div id="playlistSearchSection" style="display: none; width: 100%; margin-bottom: 20px;">
            <div class="search-container">
                <input type="text" id="playlistSearchInput" data-i18n="search_add_placeholder" placeholder="Search for music to add...">
                <button onclick="searchMusicForPlaylist()" data-i18n="search_btn">Search</button>
            </div>
            <div class="results" id="playlistSearchResultsList"></div>
        </div>

        <div id="playlistTracksList" style="width: 100%;"></div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h2 data-i18n="settings_title">Settings</h2>
            <label data-i18n="lidarr_url">Lidarr URL</label>
            <input type="text" id="lidarrUrl" placeholder="http://192.168.x.x:8686">
            <label data-i18n="lidarr_key">Lidarr API Key</label>
            <input type="text" id="lidarrKey" placeholder="xxxxxxxxxxxxxxx">
            <label data-i18n="music_path">NAS Music Folder (Absolute)</label>
            <input type="text" id="musicPath" placeholder="/mnt/pool/media/music">
            <label data-i18n="language">Language</label>
            <select id="langSelect">
                <option value="en">English</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
            </select>
            <div class="modal-actions">
                <button style="background: #555;" onclick="closeSettings()" data-i18n="cancel_btn">Cancel</button>
                <button onclick="saveSettings()" data-i18n="save_btn">Save</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const translations = {
            en: {
                manage_playlists: "Manage Playlists",
                search_placeholder: "Search for music...",
                search_btn: "Search",
                add_to_playlists: "Add to playlists",
                add_btn: "Add",
                back_btn: "← Back",
                my_playlists: "My Playlists",
                new_playlist_placeholder: "New playlist name...",
                create_btn: "Create",
                delete_btn: "Delete",
                manage_playlist_btn: "Manage playlist",
                done_editing_btn: "Done editing",
                search_add_placeholder: "Search for music to add...",
                settings_title: "Settings",
                lidarr_url: "Lidarr URL",
                lidarr_key: "Lidarr API Key",
                music_path: "NAS Music Folder (Absolute)",
                language: "Language",
                cancel_btn: "Cancel",
                save_btn: "Save",
                no_results: "No results.",
                no_results_itunes: "No results found on iTunes.",
                no_playlists: "No playlist found. Check your settings.",
                no_playlists_manager: "No playlist found.",
                empty_playlist: "The playlist is empty.",
                error_reading: "Error reading.",
                added_success: "Added successfully!",
                added_pending: "Missing track, Lidarr download requested...",
                error_adding: "Error while adding",
                server_error: "Server error",
                conn_error: "Server connection error",
                checking: "Checking...",
                processing: "Processing...",
                save_changes: "Save changes",
                settings_saved: "Settings saved",
                playlist_created: "Playlist created!",
                track_removed: "Track removed",
                error_deleting: "Error while deleting",
                playlist_deleted: "Playlist deleted",
                confirm_remove: "Are you sure you want to remove this track from the playlist?",
                confirm_delete: "Are you sure you want to permanently delete this playlist (the .m3u file)?",
                remove_tooltip: "Remove track"
            },
            fr: {
                manage_playlists: "Gérer les Playlists",
                search_placeholder: "Chercher une musique...",
                search_btn: "Rechercher",
                add_to_playlists: "Ajouter aux playlists",
                add_btn: "Ajouter",
                back_btn: "← Retour",
                my_playlists: "Mes Playlists",
                new_playlist_placeholder: "Nom de la nouvelle playlist...",
                create_btn: "Créer",
                delete_btn: "Supprimer",
                manage_playlist_btn: "Gérer la playlist",
                done_editing_btn: "Terminer la gestion",
                search_add_placeholder: "Chercher une musique à ajouter...",
                settings_title: "Paramètres",
                lidarr_url: "URL Lidarr",
                lidarr_key: "Clé API Lidarr",
                music_path: "Dossier Musique NAS (Absolu)",
                language: "Langue",
                cancel_btn: "Annuler",
                save_btn: "Enregistrer",
                no_results: "Aucun résultat.",
                no_results_itunes: "Aucun résultat trouvé sur iTunes.",
                no_playlists: "Aucune playlist trouvée. Vérifiez vos paramètres.",
                no_playlists_manager: "Aucune playlist trouvée.",
                empty_playlist: "La playlist est vide.",
                error_reading: "Erreur lors de la lecture.",
                added_success: "Ajouté avec succès !",
                added_pending: "Piste manquante, téléchargement Lidarr demandé...",
                error_adding: "Erreur lors de l'ajout",
                server_error: "Erreur serveur",
                conn_error: "Erreur de connexion au serveur",
                checking: "Vérification...",
                processing: "Traitement...",
                save_changes: "Sauvegarder les modifications",
                settings_saved: "Paramètres sauvegardés",
                playlist_created: "Playlist créée !",
                track_removed: "Musique retirée",
                error_deleting: "Erreur lors de la suppression",
                playlist_deleted: "Playlist supprimée",
                confirm_remove: "Voulez-vous vraiment retirer cette musique de la playlist ?",
                confirm_delete: "Voulez-vous vraiment supprimer définitivement cette playlist (le fichier .m3u) ?",
                remove_tooltip: "Supprimer la musique"
            },
            de: {
                manage_playlists: "Playlists verwalten",
                search_placeholder: "Nach Musik suchen...",
                search_btn: "Suchen",
                add_to_playlists: "Zu Playlists hinzufügen",
                add_btn: "Hinzufügen",
                back_btn: "← Zurück",
                my_playlists: "Meine Playlists",
                new_playlist_placeholder: "Neuer Playlist-Name...",
                create_btn: "Erstellen",
                delete_btn: "Löschen",
                manage_playlist_btn: "Playlist verwalten",
                done_editing_btn: "Bearbeitung beenden",
                search_add_placeholder: "Nach Musik zum Hinzufügen suchen...",
                settings_title: "Einstellungen",
                lidarr_url: "Lidarr URL",
                lidarr_key: "Lidarr API Schlüssel",
                music_path: "NAS Musikordner (Absolut)",
                language: "Sprache",
                cancel_btn: "Abbrechen",
                save_btn: "Speichern",
                no_results: "Keine Ergebnisse.",
                no_results_itunes: "Keine Ergebnisse auf iTunes gefunden.",
                no_playlists: "Keine Playlists gefunden. Überprüfen Sie Ihre Einstellungen.",
                no_playlists_manager: "Keine Playlists gefunden.",
                empty_playlist: "Die Playlist ist leer.",
                error_reading: "Fehler beim Lesen.",
                added_success: "Erfolgreich hinzugefügt!",
                added_pending: "Fehlender Titel, Lidarr-Download angefordert...",
                error_adding: "Fehler beim Hinzufügen",
                server_error: "Serverfehler",
                conn_error: "Serververbindungsfehler",
                checking: "Wird überprüft...",
                processing: "Wird bearbeitet...",
                save_changes: "Änderungen speichern",
                settings_saved: "Einstellungen gespeichert",
                playlist_created: "Playlist erstellt!",
                track_removed: "Titel entfernt",
                error_deleting: "Fehler beim Löschen",
                playlist_deleted: "Playlist gelöscht",
                confirm_remove: "Möchten Sie diesen Titel wirklich aus der Playlist entfernen?",
                confirm_delete: "Möchten Sie diese Playlist (die .m3u Datei) wirklich endgültig löschen?",
                remove_tooltip: "Titel entfernen"
            }
        };

        let currentLang = 'en';

        function t(key) {
            return translations[currentLang][key] || key;
        }

        function applyTranslations() {
            document.documentElement.lang = currentLang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (el.tagName === 'INPUT' && el.hasAttribute('placeholder')) {
                    el.placeholder = t(key);
                } else {
                    el.textContent = t(key);
                }
            });
        }

        let selectedTrack = null;

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/settings');
                const conf = await res.json();
                if(conf.language) currentLang = conf.language;
            } catch(e) {}
            applyTranslations();
            loadPlaylists();
        });

        function showToast(msg, color = 'var(--primary)') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.borderLeft = `5px solid ${color}`;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 4000);
        }

        async function loadPlaylists() {
            try {
                const res = await fetch('/api/playlists');
                const list = await res.json();
                const container = document.getElementById('playlistsList');
                container.innerHTML = '';
                if(list.length === 0) {
                    container.innerHTML = `<span style="color:#aaa;">${t('no_playlists')}</span>`;
                }
                list.forEach(p => {
                    const lbl = document.createElement('label');
                    lbl.className = 'playlist-label';
                    const name = p.replace(/\.m3u$/i, '');
                    lbl.innerHTML = `<input type="checkbox" value="${p}"> ${name}`;
                    container.appendChild(lbl);
                });
            } catch(e) { console.error(e); }
        }

        let mainSearchTimer = null;
        let mainLastSearch = '';
        let plSearchTimer = null;
        let plLastSearch = '';

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('searchInput').addEventListener('input', function() {
                const val = this.value.trim();
                if (val === '') {
                    document.getElementById('resultsList').innerHTML = '';
                    document.getElementById('playlistsSection').style.display = 'none';
                    mainLastSearch = '';
                    return;
                }
                
                if (!mainSearchTimer) {
                    mainSearchTimer = setTimeout(() => {
                        const currentVal = document.getElementById('searchInput').value.trim();
                        if (currentVal !== '' && currentVal !== mainLastSearch) {
                            mainLastSearch = currentVal;
                            searchMusic();
                        }
                        mainSearchTimer = null;
                    }, 500);
                }
            });

            document.getElementById('playlistSearchInput').addEventListener('input', function() {
                const val = this.value.trim();
                if (val === '') {
                    document.getElementById('playlistSearchResultsList').innerHTML = '';
                    plLastSearch = '';
                    return;
                }

                if (!plSearchTimer) {
                    plSearchTimer = setTimeout(() => {
                        const currentVal = document.getElementById('playlistSearchInput').value.trim();
                        if (currentVal !== '' && currentVal !== plLastSearch) {
                            plLastSearch = currentVal;
                            searchMusicForPlaylist();
                        }
                        plSearchTimer = null;
                    }, 500);
                }
            });
        });

        async function searchMusic() {
            const q = document.getElementById('searchInput').value;
            if(!q) return;
            const res = await fetch('/api/search?q=' + encodeURIComponent(q));
            const tracks = await res.json();
            
            const resultsDiv = document.getElementById('resultsList');
            resultsDiv.innerHTML = '';
            document.getElementById('playlistsSection').style.display = 'none';
            selectedTrack = null;

            if(!tracks || tracks.length === 0) {
                resultsDiv.innerHTML = `<span style="color:#aaa;">${t('no_results_itunes')}</span>`;
                return;
            }

            tracks.forEach(tr => {
                const card = document.createElement('div');
                card.className = 'track-card';
                card.innerHTML = `
                    <img src="${tr.cover}" class="track-cover">
                    <div class="track-info">
                        <div class="track-title">${tr.title}</div>
                        <div class="track-artist">${tr.artist} - ${tr.album}</div>
                    </div>
                `;
                card.onclick = async () => {
                    document.querySelectorAll('.track-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    selectedTrack = tr;
                    
                    card.after(document.getElementById('playlistsSection'));
                    document.getElementById('playlistsSection').style.display = 'block';
                    document.getElementById('playlistsSection').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    
                    document.querySelectorAll('#playlistsList input[type="checkbox"]').forEach(c => c.checked = false);
                    
                    const btn = document.getElementById('addBtn');
                    btn.disabled = true;
                    btn.textContent = t('checking');
                    
                    try {
                        const res = await fetch('/api/track_status', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                title: selectedTrack.title,
                                artist: selectedTrack.artist,
                                album: selectedTrack.album
                            })
                        });
                        const existingPlaylists = await res.json();
                        existingPlaylists.forEach(p => {
                            const pSafe = p.replace(/\\/g, '\\\\');
                            const cb = document.querySelector(`#playlistsList input[value="${pSafe}"]`);
                            if (cb) cb.checked = true;
                        });
                        if (existingPlaylists.length > 0) {
                            btn.textContent = t('save_changes');
                        } else {
                            btn.textContent = t('add_btn');
                        }
                    } catch(e) {
                        btn.textContent = t('add_btn');
                    } finally {
                        btn.disabled = false;
                    }
                };
                resultsDiv.appendChild(card);
            });
        }

        async function addMusic() {
            if(!selectedTrack) return;
            const checkboxes = document.querySelectorAll('#playlistsList input[type="checkbox"]');
            const selectedPlaylists = Array.from(checkboxes).filter(c => c.checked).map(c => c.value);
            
            const btn = document.getElementById('addBtn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = t('processing');

            try {
                const res = await fetch('/api/add', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        title: selectedTrack.title,
                        artist: selectedTrack.artist,
                        album: selectedTrack.album,
                        playlists: selectedPlaylists
                    })
                });
                let data = {};
                try { data = await res.json(); } catch(e) {}
                
                if(res.ok) {
                    const msg = data.status === 'pending' ? t('added_pending') : t('added_success');
                    showToast(msg, data.status === 'added' ? 'var(--success)' : 'var(--secondary)');
                } else {
                    showToast(t('error_adding'), "var(--error)");
                }
            } catch(e) {
                showToast(t('conn_error'), "var(--error)");
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }

        async function openSettings() {
            try {
                const res = await fetch('/api/settings');
                const conf = await res.json();
                document.getElementById('lidarrUrl').value = conf.lidarrUrl || '';
                document.getElementById('lidarrKey').value = conf.lidarrKey || '';
                document.getElementById('musicPath').value = conf.musicPath || '';
                document.getElementById('langSelect').value = conf.language || 'en';
            } catch(e) {}
            document.getElementById('settingsModal').style.display = 'flex';
        }

        function closeSettings() {
            document.getElementById('settingsModal').style.display = 'none';
        }

        async function saveSettings() {
            const conf = {
                lidarrUrl: document.getElementById('lidarrUrl').value,
                lidarrKey: document.getElementById('lidarrKey').value,
                musicPath: document.getElementById('musicPath').value,
                language: document.getElementById('langSelect').value
            };
            await fetch('/api/settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(conf)
            });
            currentLang = conf.language;
            applyTranslations();
            closeSettings();
            showToast(t('settings_saved'), "var(--success)");
            loadPlaylists();
        }

        let currentPlaylistName = "";

        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            if(viewId === 'playlistDetailView') {
                document.getElementById('playlistDetailView').classList.remove('edit-mode');
                document.getElementById('playlistSearchSection').style.display = 'none';
                document.getElementById('deletePlaylistBtn').style.display = 'none';
                document.getElementById('toggleEditBtn').textContent = t('manage_playlist_btn');
                document.getElementById('playlistSearchResultsList').innerHTML = '';
            }
        }

        async function openPlaylistsManager() {
            switchView('playlistManagerView');
            loadPlaylistsManager();
        }

        async function loadPlaylistsManager() {
            try {
                const res = await fetch('/api/playlists');
                const list = await res.json();
                const container = document.getElementById('managerPlaylistsList');
                container.innerHTML = '';
                if(list.length === 0) {
                    container.innerHTML = `<span style="color:#aaa;">${t('no_playlists_manager')}</span>`;
                }
                list.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'playlist-manager-item';
                    const name = p.replace(/\.m3u$/i, '');
                    div.innerHTML = `<span style="font-weight:bold;">${name}</span> <span>▶</span>`;
                    div.onclick = () => openPlaylistDetail(p);
                    container.appendChild(div);
                });
            } catch(e) { console.error(e); }
        }

        async function createPlaylist() {
            const input = document.getElementById('newPlaylistName');
            const name = input.value.trim();
            if(!name) return;
            try {
                const res = await fetch('/api/playlist/create', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name: name})
                });
                if(res.ok) {
                    input.value = '';
                    loadPlaylistsManager();
                    loadPlaylists();
                    showToast(t('playlist_created'), "var(--success)");
                } else {
                    showToast(t('server_error'), "var(--error)");
                }
            } catch(e) { showToast(t('server_error'), "var(--error)"); }
        }

        async function openPlaylistDetail(playlistName) {
            currentPlaylistName = playlistName;
            document.getElementById('detailPlaylistTitle').textContent = playlistName.replace(/\.m3u$/i, '');
            switchView('playlistDetailView');
            loadPlaylistTracks();
        }

        async function loadPlaylistTracks() {
            try {
                const res = await fetch('/api/playlist/read?name=' + encodeURIComponent(currentPlaylistName));
                const container = document.getElementById('playlistTracksList');
                container.innerHTML = '';
                
                if(!res.ok) {
                    container.innerHTML = `<span style="color:var(--error);">${t('error_reading')}</span>`;
                    return;
                }
                const tracks = await res.json();
                if(!tracks || tracks.length === 0) {
                    container.innerHTML = `<span style="color:#aaa;">${t('empty_playlist')}</span>`;
                    return;
                }
                
                tracks.forEach(tr => {
                    const div = document.createElement('div');
                    div.className = 'playlist-track-item';
                    div.innerHTML = `
                        <div class="playlist-track-name">${tr.display}</div>
                        <button class="delete-icon-btn" title="${t('remove_tooltip')}" onclick="removeTrack('${tr.line.replace(/'/g, "\\'")}')">🗑️</button>
                    `;
                    container.appendChild(div);
                });
            } catch(e) { console.error(e); }
        }

        function toggleEditMode() {
            const view = document.getElementById('playlistDetailView');
            view.classList.toggle('edit-mode');
            const isEdit = view.classList.contains('edit-mode');
            document.getElementById('playlistSearchSection').style.display = isEdit ? 'block' : 'none';
            document.getElementById('deletePlaylistBtn').style.display = isEdit ? 'block' : 'none';
            document.getElementById('toggleEditBtn').textContent = isEdit ? t('done_editing_btn') : t('manage_playlist_btn');
        }

        async function removeTrack(line) {
            if(!confirm(t('confirm_remove'))) return;
            try {
                const res = await fetch('/api/playlist/remove_track', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({playlist: currentPlaylistName, line: line})
                });
                if(res.ok) {
                    loadPlaylistTracks();
                    showToast(t('track_removed'), "var(--success)");
                } else {
                    showToast(t('error_deleting'), "var(--error)");
                }
            } catch(e) { showToast(t('server_error'), "var(--error)"); }
        }

        async function deleteCurrentPlaylist() {
            if(!confirm(t('confirm_delete'))) return;
            try {
                const res = await fetch('/api/playlist/delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({playlist: currentPlaylistName})
                });
                if(res.ok) {
                    showToast(t('playlist_deleted'), "var(--success)");
                    loadPlaylists();
                    openPlaylistsManager();
                } else {
                    showToast(t('error_deleting'), "var(--error)");
                }
            } catch(e) { showToast(t('server_error'), "var(--error)"); }
        }

        async function searchMusicForPlaylist() {
            const q = document.getElementById('playlistSearchInput').value;
            if(!q) return;
            const res = await fetch('/api/search?q=' + encodeURIComponent(q));
            const tracks = await res.json();
            
            const resultsDiv = document.getElementById('playlistSearchResultsList');
            resultsDiv.innerHTML = '';

            if(!tracks || tracks.length === 0) {
                resultsDiv.innerHTML = `<span style="color:#aaa;">${t('no_results')}</span>`;
                return;
            }

            tracks.forEach(tr => {
                const card = document.createElement('div');
                card.className = 'track-card';
                card.innerHTML = `
                    <img src="${tr.cover}" class="track-cover">
                    <div class="track-info">
                        <div class="track-title">${tr.title}</div>
                        <div class="track-artist">${tr.artist} - ${tr.album}</div>
                    </div>
                `;
                card.onclick = () => addMusicToCurrentPlaylist(tr, card);
                resultsDiv.appendChild(card);
            });
        }

        async function addMusicToCurrentPlaylist(track, cardElement) {
            const originalColor = cardElement.style.borderColor;
            cardElement.style.borderColor = 'var(--secondary)';
            cardElement.style.opacity = '0.7';

            try {
                const res = await fetch('/api/add', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        title: track.title,
                        artist: track.artist,
                        album: track.album,
                        playlists: [currentPlaylistName]
                    })
                });
                let data = {};
                try { data = await res.json(); } catch(e) {}
                
                if(res.ok) {
                    const msg = data.status === 'pending' ? t('added_pending') : t('added_success');
                    showToast(msg, data.status === 'added' ? 'var(--success)' : 'var(--secondary)');
                    if(data.status === 'added') {
                        loadPlaylistTracks();
                    }
                } else {
                    showToast(t('error_adding'), "var(--error)");
                }
            } catch(e) {
                showToast(t('conn_error'), "var(--error)");
            } finally {
                cardElement.style.borderColor = originalColor;
                cardElement.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
