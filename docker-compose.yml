services:
  reqhub:
    image: ghcr.io/sdlm-technologies/reqhub:latest
    container_name: sdlm-reqhub
    ports:
      - "8080:8080" # Web interface access port
    environment:
      - TZ=Europe/Paris
    volumes:
      # CRITICAL: The right side of this mapping MUST EXACTLY MATCH the internal path Lidarr uses for music!
      # Example: If Lidarr sees music at `/Navidrome/media/musique`, this must be `- /your/real/nas/path:/Navidrome/media/musique:rw`
      - /mnt/your_pool/music_folder:/mnt/your_pool/music_folder:rw
      # Local folder to save the configuration (URL, API Key, pending tracks)
      - ./data:/app/data
    restart: unless-stopped
